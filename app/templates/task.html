{% extends "base.html" %}

{% block content %}

<h2>Your Tasks</h2>

<form action="{{ url_for('task.add_task') }}" method="POST">

<input type="text" name="title" placeholder="New Task" required>
<button class="btn">Add</button>

</form>

<br>

<form action="{{ url_for('task.clear_task') }}" method="POST">
<button class="btn-clear">Clear All</button>
</form>

<table>

<tr>
<th>ID</th>
<th>Task</th>
<th>Status</th>
<th>Change</th>
</tr>

{% for task in tasks %}

<tr>

<td>{{ loop.index }}</td>
<td>{{ task.title }}</td>
<td>{{ task.status }}</td>

<td>
<form action="{{ url_for('task.toggle_status', task_id=task.id) }}" method="POST">
<button class="btn-sml">Next</button>
</form>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
